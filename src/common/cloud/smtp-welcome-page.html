<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>$brand</title>
    <meta name="viewport" content="width=device-width" />
    <style></style>
  </head>

  <body>
    <div style="width: 400px; margin: 0 auto">
      <div
        style="border-bottom: 1px solid #19193c; color: #fff; margin: 10px 0"
      ></div>
      <div
        style="
          padding: 10px;
          font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        "
      >
        <span style="margin-bottom: 0px">
          Please use the following verification code into your $brand.
        </span>
        <div
          style="
            background-color: #ffffff;
            border-top: 1px solid #ededed;
            height: 1px;
            margin: 10px 0 20px 0;
          "
        ></div>
        <div style="text-align: center">
          <span
            style="
              font-size: 16px;
              font-weight: bold;
              color: #777;
              font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
              line-height: 1.6;
            "
          >
            Your Verification Code :
          </span>
          <br />
          <br />
          <span style="font-size: 20px; font-weight: bold; color: #555"
            >$code</span
          >
        </div>
        <br />
        <span
          style="
            font-size: 14px;
            color: #333;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.35;
          "
        >
          <p>If you are not logged in, please contact the customer center.</p>
        </span>
        <div
          style="
            background-color: #ffffff;
            border-bottom: 1px solid #ededed;
            height: 1px;
            margin: 20px 0 10px 0;
          "
        ></div>
        <div>
          <span
            style="
              font-size: 14px;
              color: #333;
              font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
              line-height: 1.35;
            "
          >
            <p>Thank you for using $brand</p>
          </span>
        </div>
      </div>
    </div>
  </body>
</html>
